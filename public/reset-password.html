<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Bacaro Budget Manager</title>
    <link rel="icon" type="image/png" href="/assets/images/bb_favicon.png">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <script src="/assets/js/i18n.js"></script>
	<script src="/assets/js/main.js"></script>
    <style>
        html,
        body {
            overflow-y: auto !important;
            overflow-x: hidden !important;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #2f4533 0%, #598539 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-modal-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .reset-modal-card {
            background-color: var(--dark-green);
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .reset-header h2 {
            color: var(--white);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .reset-header p {
            color: var(--text-light);
            font-size: 16px;
            line-height: 1.5;
        }

        .reset-form .input-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .reset-form .floating-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .reset-form .floating-input:focus {
            outline: none;
            border-color: var(--primary-green);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(89, 131, 57, 0.2);
        }

        .reset-form .floating-input::placeholder {
            color: transparent;
        }

        .reset-form .floating-label {
            position: absolute;
            left: 20px;
            top: 16px;
            color: var(--text-light);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
            background: transparent;
            padding: 0 4px;
        }

        .reset-form .input-group:focus-within .floating-label,
        .reset-form .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: -10px;
            font-size: 12px;
            color: var(--primary-green);
            font-weight: 600;
        }

        .password-strength {
            width: 100%;
            box-sizing: border-box;
            font-size: 12px;
            margin: 4px 0 16px;
            padding: 6px 12px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .strength-weak {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .strength-medium {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .strength-strong {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .reset-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-green);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .reset-btn:hover {
            background: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(89, 131, 57, 0.3);
        }

        .reset-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .message.error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .message.info {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .reset-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reset-footer a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .reset-footer a:hover {
            color: var(--white);
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .reset-modal-card {
                padding: 30px 20px;
                margin: 20px;
            }

            .reset-header h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 915px) and (orientation: landscape) {
            body {
                align-items: flex-start;
                padding: 8px 0;
                overflow-y: auto;
            }

            .reset-modal-container {
                max-width: 340px;
                padding: 8px;
            }

            .reset-modal-card {
                padding: 16px 14px;
                border-radius: 14px;
                max-height: calc(100vh - 16px);
                overflow-y: auto;
            }

            .reset-header {
                margin-bottom: 14px;
            }

            .reset-header h2 {
                font-size: 18px;
                margin-bottom: 6px;
            }

            .reset-header p {
                font-size: 12px;
                line-height: 1.35;
            }

            .reset-form .input-group {
                margin-bottom: 10px;
            }

            .reset-form .floating-input {
                padding: 12px 14px;
                font-size: 13px;
            }

            .reset-form .floating-label {
                left: 14px;
                top: 12px;
                font-size: 13px;
            }

            .password-strength {
                font-size: 11px;
                margin: 2px 0 10px;
                padding: 5px 10px;
            }

            .reset-btn {
                padding: 12px;
                font-size: 13px;
                margin-top: 8px;
            }

            .message {
                padding: 8px 12px;
                margin-bottom: 10px;
                font-size: 12px;
            }

            .reset-footer {
                margin-top: 12px;
                padding-top: 10px;
            }

            .reset-footer a {
                font-size: 12px;
            }
        }

        @media (max-width: 915px) and (max-height: 430px) and (orientation: landscape) {
            .reset-modal-container {
                max-width: 320px;
                padding: 6px;
            }

            .reset-modal-card {
                padding: 14px 12px;
                border-radius: 12px;
            }

            .reset-header {
                margin-bottom: 12px;
            }

            .reset-header h2 {
                font-size: 16px;
            }

            .reset-header p {
                font-size: 11px;
            }

            .reset-form .input-group {
                margin-bottom: 8px;
            }

            .reset-form .floating-input {
                padding: 10px 12px;
                font-size: 12px;
            }

            .reset-form .floating-label {
                left: 12px;
                top: 10px;
                font-size: 12px;
            }

            .password-strength {
                font-size: 10px;
                margin: 2px 0 8px;
                padding: 4px 8px;
            }

            .reset-btn {
                padding: 10px;
                font-size: 12px;
                margin-top: 6px;
            }

            .reset-footer {
                margin-top: 10px;
                padding-top: 8px;
            }

            .reset-footer a {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-modal-container">
        <div class="reset-modal-card">
            <div class="reset-header">
                <h2 data-i18n="str_6072e83b">Reset Password</h2>
                <p id="headerSubtitle" data-i18n="str_bbddd6ba">Enter your new password</p>
            </div>

            <div id="message" class="message" style="display: none;"></div>

            <form id="resetForm" class="reset-form" style="display: none;">
                <div class="input-group">
                    <input type="password" id="password" class="floating-input" placeholder=" " required="">
                    <label class="floating-label" data-i18n="str_ae3bb2a1">New Password</label>
                </div>

                <div id="strengthIndicator" class="password-strength"></div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" class="floating-input" placeholder=" " required="">
                    <label class="floating-label" data-i18n="str_887f7db1">Confirm Password</label>
                </div>

                <button type="submit" class="reset-btn" id="submitBtn" data-i18n="str_6072e83b">
                    Reset Password
                </button>
            </form>

            <div class="reset-footer">
                <a href="/" data-i18n="str_0ae5268d">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthIndicator = document.getElementById('strengthIndicator');
        const headerSubtitle = document.getElementById('headerSubtitle');

        // Check token validity on page load
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showMessage('Invalid reset link. Please request a new one.', 'error');
        } else {
            verifyToken(token);
        }

        async function verifyToken(token) {
            try {
                const response = await fetch(`/api/reset?action=verify&token=${token}`);
                const data = await response.json();

                if (data.valid) {
                    resetForm.style.display = 'block';
                    headerSubtitle.textContent = `Welcome back, ${data.username}!`;
                } else {
                    showMessage('This password reset link has expired. Please request a new one.', 'error');
                }
            } catch (error) {
                console.error('Error verifying token:', error);
                showMessage('An error occurred. Please try again.', 'error');
            }
        }

        // Password strength indicator
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 'weak';

            if (password.length >= 6 && /[a-z]/.test(password) && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
                strength = 'strong';
            } else if (password.length >= 6) {
                strength = 'medium';
            }

            strengthIndicator.className = `password-strength strength-${strength}`;
            strengthIndicator.textContent = `Strength: ${strength.charAt(0).toUpperCase() + strength.slice(1)}`;
            strengthIndicator.style.display = 'block';
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!password || !confirmPassword) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Resetting...';

            try {
                const response = await fetch('/api/reset?action=reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password, confirmPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showMessage(data.error || 'An error occurred', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Failed to reset password. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Reset Password';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
    </script>

</body></html>
